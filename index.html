<style>
  body, html {
    margin: 0;
    padding: 0;
    height: 100%;
    width: 100%;
    overflow: hidden;
    background: black;
  }

  .container {
    display: flex;
    flex-direction: column;
    width: 100%;
    height: 100vh;
  }

  /* Image Section */
  .top-section {
    height: 30vh;
    width: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  @media (orientation: portrait) {
    .top-section { height: 50vh; }
    .bottom-section { height: 50vh !important; }
  }

  /* The "Window" */
  .bottom-section {
    height: 70vh;
    width: 100%;
    overflow: hidden; 
    position: relative;
    background: white;
  }

  /* The Iframe: Pushed to be massive, then scaled from the bottom */
  .scaled-iframe {
    position: absolute;
    /* 1. Make it significantly larger than the container */
    width: 200%; 
    height: 200%; 
    
    /* 2. Position it relative to the bottom center */
    bottom: 0;
    left: 50%;
    
    /* 3. Scale and Pivot */
    /* Adjust 'scale' up (e.g., 1.5) to zoom in more */
    transform: translateX(-50%) scale(1.2); 
    transform-origin: bottom center;
    
    border: none;
  }

  img { max-width: 100%; max-height: 100%; object-fit: contain; }
</style>

<div class="container">
  <div class="top-section">
    <img src="PD-text.jpg" alt="Header Image">
  </div>
  <div class="bottom-section">
    <iframe src="https://playcanv.as/b/2756fbb0"
            allow="xr-spatial-tracking;">
    </iframe>
  </div>
</div>
